<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Amulya Agarwal — Product Designer. Currently helping foodies spend less time on screens and more on dining at EazyDiner." />
    <title>Amulya Agarwal — Product Designer</title>
    <script>
      // apply the saved theme — or the browser's preference — before first paint so the page never flashes light
      const stored = localStorage.getItem('theme');
      if (stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
